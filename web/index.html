<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sleeper Trade Advisor</title>
    <meta
      name="description"
      content="Fantasy football trade advice, roster analysis, and waiver insights for your Sleeper league."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%88%3C/text%3E%3C/svg%3E"
    />
    <!-- Set the theme before first paint so there's no flash of the wrong mode. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("sta_theme");
          if (t !== "light" && t !== "dark") {
            t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="wrap">
        <div class="brand">
          <span class="brand-emoji">🏈</span>
          <div>
            <h1>Sleeper Trade Advisor</h1>
            <p class="tagline">Live roster analysis &amp; objective trade values for your league</p>
          </div>
        </div>
        <div class="header-actions">
          <button id="ask-ai-btn" class="ask-ai-btn" type="button" data-tab="chat" title="Ask AI about your team">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
            </svg>
            <span>Ask AI</span>
          </button>
          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle light and dark mode" title="Toggle light / dark mode">
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="4.2" />
              <path d="M12 2v2M12 20v2M4.2 4.2l1.5 1.5M18.3 18.3l1.5 1.5M2 12h2M20 12h2M4.2 19.8l1.5-1.5M18.3 5.7l1.5-1.5" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="wrap">
      <section class="config">
        <div class="field">
          <label for="username">Sleeper username</label>
          <input id="username" type="text" autocomplete="off" spellcheck="false" placeholder="your_username" />
        </div>
        <div class="field">
          <label for="league">League ID <span class="opt">(optional)</span></label>
          <input id="league" type="text" autocomplete="off" spellcheck="false" placeholder="auto-detected if blank" />
        </div>
      </section>

      <nav class="tabs">
        <button class="tab active" data-tab="team">My Team</button>
        <button class="tab" data-tab="targets">Trade Targets</button>
        <button class="tab" data-tab="evaluate">Evaluate a Trade</button>
        <button class="tab" data-tab="league">League Market</button>
        <button class="tab" data-tab="waivers">Waiver Wire</button>
        <button class="tab" data-tab="trending-add">Trending Adds</button>
        <button class="tab" data-tab="trending-drop">Trending Drops</button>
      </nav>

      <section id="evaluate-inputs" class="evaluate-inputs" style="display: none">
        <div class="field grow">
          <label for="give">You give <span class="opt">(comma-separated)</span></label>
          <input id="give" type="text" autocomplete="off" placeholder="Bijan Robinson, Chris Olave" />
        </div>
        <div class="field grow">
          <label for="get">You get <span class="opt">(comma-separated)</span></label>
          <input id="get" type="text" autocomplete="off" placeholder="CeeDee Lamb" />
        </div>
        <button id="eval-run" class="primary">Evaluate</button>
      </section>

      <div id="status" class="status"></div>
      <div id="result" class="result"></div>

      <footer class="site-footer">
        <p>
          Data from the free public
          <a href="https://docs.sleeper.com" target="_blank" rel="noopener">Sleeper API</a>
          and
          <a href="https://fantasycalc.com" target="_blank" rel="noopener">FantasyCalc</a>.
          Trade values are a market snapshot — treat sub-5% gaps as coin flips and
          weigh roster fit, not just the number.
        </p>
      </footer>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
